services:
  1c-server:
    image: mussolene/1c-server:${PLATFORM_VERSION:-8.3.22.1851}
    hostname: srv1c
    privileged: true
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        COMMON_BASE_IMAGE: ${COMMON_BASE_IMAGE:-mussolene/linux-common-base}
        COMMON_BASE_TAG: ${COMMON_BASE_TAG:-jammy}
        PLATFORM_VERSION: ${PLATFORM_VERSION:-8.3.22.1851}
        PLATFORM_DIST_NAME: ${PLATFORM_DIST_NAME-}
        ENABLE_USBIP_TOOLS: ${ENABLE_USBIP_TOOLS:-0}
    depends_on:
      - 1c-pg
    environment:
      SRV1CV8_DEBUG: "1"
      SRV1CV8_PORT: "1540"
      SRV1CV8_REGPORT: "1541"
      SRV1CV8_RANGE: "1560:1691"
    ports:
      - "1540-1541:1540-1541"
      - "1560-1691:1560-1691"
      - 1545:1545
      - 67:67/udp
      - 475:475/udp
      - 5901:5900
    networks:
      debug_def:
        ipv4_address: 172.16.1.3

  1c-client:
    image: mussolene/1c-client:${PLATFORM_VERSION:-8.3.22.1851}
    hostname: client1c
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        COMMON_BASE_IMAGE: ${COMMON_BASE_IMAGE:-mussolene/linux-common-base}
        COMMON_BASE_TAG: ${COMMON_BASE_TAG:-jammy}
        DESKTOP_BASE_IMAGE: ${DESKTOP_BASE_IMAGE:-mussolene/linux-desktop-base}
        DESKTOP_BASE_TAG: ${DESKTOP_BASE_TAG:-jammy}
        ONESCRIPT_BASE_IMAGE: ${ONESCRIPT_BASE_IMAGE:-mussolene/linux-onescript}
        ONESCRIPT_BASE_TAG: ${ONESCRIPT_BASE_TAG:-2.0.0}
        PLATFORM_VERSION: ${PLATFORM_VERSION:-8.3.22.1851}
        PLATFORM_DIST_NAME: ${PLATFORM_DIST_NAME-}
        VANESSA_ADD_VERSION: ${VANESSA_ADD_VERSION:-6.9.5}
        VANESSA_RUNNER_VERSION: ${VANESSA_RUNNER_VERSION:-2.6.0}
    depends_on:
      - 1c-pg
      - 1c-server
    ports:
      - 5900:5900
    networks:
      debug_def:
        ipv4_address: 172.16.1.2
    volumes:
      - ./volumes/1c-client/data:/mnt/data
      - ./volumes/1c-client/cache:/root/.1cv8/1C/1cv8/

  1c-pg:
    build:
      context: .
      dockerfile: pg/Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-17}
        PG_REPO_DIST: ${PG_REPO_DIST:-bookworm}
    image: mussolene/postgresql:1c-${PG_MAJOR:-17}
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.example to .env and set POSTGRES_PASSWORD}
      LANG: ru_RU.UTF-8
      LANGUAGE: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8
      POSTGRES_INITDB_ARGS: -EUTF-8
    ports:
      - 5432:5432
    networks:
      debug_def:
        ipv4_address: 172.16.1.4

networks:
  debug_def:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24
