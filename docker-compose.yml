services:
  linux-common-base:
    profiles: ["build"]
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/linux-common-base:${COMMON_BASE_TAG:-bookworm}
    platform: linux/amd64
    build:
      context: .
      dockerfile: base/linux-common/Dockerfile
      args:
        COMMON_BASE_DIST: bookworm

  linux-desktop-base:
    profiles: ["build"]
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/linux-desktop-base:${DESKTOP_BASE_TAG:-bookworm}
    platform: linux/amd64
    build:
      context: .
      dockerfile: base/linux-desktop/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
      args:
        COMMON_BASE_IMAGE: common_base

  linux-onescript-builder:
    profiles: ["build"]
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/linux-onescript-builder:${ONESCRIPT_BUILD_TAG:-2.0.0}
    platform: linux/amd64
    build:
      context: .
      dockerfile: base/linux-onescript-builder/Dockerfile
      args:
        ONESCRIPT_SDK_IMAGE: mcr.microsoft.com/dotnet/sdk:8.0
        ONESCRIPT_VERSION: 2.0.0

  linux-onescript:
    profiles: ["build"]
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/linux-onescript:${ONESCRIPT_BASE_TAG:-2.0.0}
    platform: linux/amd64
    build:
      context: .
      dockerfile: base/linux-onescript/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
        onescript_build: service:linux-onescript-builder
      args:
        COMMON_BASE_IMAGE: common_base
        ONESCRIPT_BUILD_IMAGE: onescript_build

  1c-dev:
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/1c-developer:${PLATFORM_VERSION:-8.5.1.1302}
    hostname: onecdev
    platform: linux/amd64
    build:
      context: .
      dockerfile: client/Dockerfile
      additional_contexts:
        desktop_base: service:linux-desktop-base
        onescript_base: service:linux-onescript
      args:
        DESKTOP_BASE_IMAGE: desktop_base
        ONESCRIPT_BASE_IMAGE: onescript_base
        PLATFORM_VERSION: ${PLATFORM_VERSION:-8.5.1.1302}
        PLATFORM_DIST_NAME: ${PLATFORM_DIST_NAME-}
        VANESSA_ADD_VERSION: ${VANESSA_ADD_VERSION:-6.8.0}
        VANESSA_RUNNER_VERSION: ${VANESSA_RUNNER_VERSION:-2.6.0}
        VANESSA_AUTOMATION_VERSION: ${VANESSA_AUTOMATION_VERSION:-1.2.043.1}
        ONEC_VANESSA_SKILL_REF: ${ONEC_VANESSA_SKILL_REF:-58b8e8b4831f4f1457707b037c8a050f5cd32e86}
        ONEC_CONTEXT_TOOLKIT_REF: ${ONEC_CONTEXT_TOOLKIT_REF:-6a1df34b06a7a71c65876298070cb13525896ee3}
        BSLLS_VERSION: ${BSLLS_VERSION:-0.25.0}
        OACS_VERSION: ${OACS_VERSION:-0.3.1a2}
      secrets:
        - its_login
        - its_password
    environment:
      ONEC_RUNTIME_MODE: ${ONEC_RUNTIME_MODE:-shell}
      OACS_PASSPHRASE: ${OACS_PASSPHRASE-}
      ONEC_FILE_DB_PATH: ${ONEC_FILE_DB_PATH:-/mnt/data/testdb}
      ONEC_DISABLE_UNSAFE_ACTION_PROTECTION: ${ONEC_DISABLE_UNSAFE_ACTION_PROTECTION:-.*}
      SRV1CV8_DEBUG: "1"
      SRV1CV8_PORT: "1540"
      SRV1CV8_REGPORT: "1541"
      SRV1CV8_RANGE: "1560:1691"
    ports:
      - "127.0.0.1:5900:5900"
    networks:
      debug_def:
        ipv4_address: 172.16.1.2
    volumes:
      - onec-license-store:/var/1C/licenses
      - ./volumes/1c-dev/data:/mnt/data
      - ./volumes/1c-dev/cache:/root/.1cv8/1C/1cv8/

  1c-pg:
    image: ${IMAGE_NAMESPACE:-ghcr.io/mussolene}/postgresql:${PG_1C_VERSION:-17.7-1.1C}
    build:
      context: .
      dockerfile: pg/Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-17}
        PG_REPO_DIST: ${PG_REPO_DIST:-bookworm}
        PG_1C_VERSION: ${PG_1C_VERSION:-17.7-1.1C}
      secrets:
        - its_login
        - its_password
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.example to .env and set POSTGRES_PASSWORD}
      LANG: ru_RU.UTF-8
      LANGUAGE: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8
      POSTGRES_INITDB_ARGS: -EUTF-8
    ports:
      - "5432:5432"
    networks:
      debug_def:
        ipv4_address: 172.16.1.4

networks:
  debug_def:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24

secrets:
  its_login:
    environment: ITS_LOGIN
  its_password:
    environment: ITS_PASSWORD

volumes:
  onec-license-store:
    name: onec-license-store
    external: true
