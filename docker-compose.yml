services:
  linux-common-base:
    profiles: ["build"]
    image: mussolene/linux-common-base:bookworm
    build:
      context: .
      dockerfile: base/linux-common/Dockerfile
      args:
        COMMON_BASE_DIST: bookworm

  linux-desktop-base:
    profiles: ["build"]
    image: mussolene/linux-desktop-base:bookworm
    build:
      context: .
      dockerfile: base/linux-desktop/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
      args:
        COMMON_BASE_IMAGE: common_base

  linux-onescript-builder:
    profiles: ["build"]
    image: mussolene/linux-onescript-builder:2.0.0
    build:
      context: .
      dockerfile: base/linux-onescript-builder/Dockerfile
      args:
        ONESCRIPT_SDK_IMAGE: mcr.microsoft.com/dotnet/sdk:8.0
        ONESCRIPT_VERSION: 2.0.0

  linux-onescript:
    profiles: ["build"]
    image: mussolene/linux-onescript:2.0.0
    build:
      context: .
      dockerfile: base/linux-onescript/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
        onescript_build: service:linux-onescript-builder
      args:
        COMMON_BASE_IMAGE: common_base
        ONESCRIPT_BUILD_IMAGE: onescript_build

  1c-server:
    image: mussolene/1c-server:${PLATFORM_VERSION:-8.3.22.1851}
    hostname: srv1c
    privileged: true
    build:
      context: .
      dockerfile: server/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
      args:
        COMMON_BASE_IMAGE: common_base
        PLATFORM_VERSION: ${PLATFORM_VERSION:-8.3.22.1851}
        PLATFORM_DIST_NAME: ${PLATFORM_DIST_NAME-}
      secrets:
        - its_login
        - its_password
    depends_on:
      - 1c-pg
    environment:
      SRV1CV8_DEBUG: "1"
      SRV1CV8_PORT: "1540"
      SRV1CV8_REGPORT: "1541"
      SRV1CV8_RANGE: "1560:1691"
    ports:
      - "1540-1541:1540-1541"
      - "1560-1691:1560-1691"
      - "1545:1545"
      - "67:67/udp"
      - "475:475/udp"
      - "5901:5900"
    networks:
      debug_def:
        ipv4_address: 172.16.1.3

  1c-client:
    image: mussolene/1c-client:${PLATFORM_VERSION:-8.3.22.1851}
    hostname: client1c
    build:
      context: .
      dockerfile: client/Dockerfile
      additional_contexts:
        desktop_base: service:linux-desktop-base
        onescript_base: service:linux-onescript
      args:
        DESKTOP_BASE_IMAGE: desktop_base
        ONESCRIPT_BASE_IMAGE: onescript_base
        PLATFORM_VERSION: ${PLATFORM_VERSION:-8.3.22.1851}
        PLATFORM_DIST_NAME: ${PLATFORM_DIST_NAME-}
        VANESSA_ADD_VERSION: 6.9.5
        VANESSA_RUNNER_VERSION: 2.6.0
      secrets:
        - its_login
        - its_password
    depends_on:
      - 1c-pg
      - 1c-server
    ports:
      - "5900:5900"
    networks:
      debug_def:
        ipv4_address: 172.16.1.2
    volumes:
      - ./volumes/1c-client/data:/mnt/data
      - ./volumes/1c-client/cache:/root/.1cv8/1C/1cv8/

  1c-pg:
    image: mussolene/postgresql:${PG_1C_VERSION:-17.7-1.1C}
    build:
      context: .
      dockerfile: pg/Dockerfile
      additional_contexts:
        common_base: service:linux-common-base
      args:
        PG_MAJOR: ${PG_MAJOR:-17}
        COMMON_BASE_IMAGE: common_base
        PG_REPO_DIST: ${PG_REPO_DIST:-bookworm}
        PG_1C_VERSION: ${PG_1C_VERSION:-17.7-1.1C}
      secrets:
        - its_login
        - its_password
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.example to .env and set POSTGRES_PASSWORD}
      LANG: ru_RU.UTF-8
      LANGUAGE: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8
      POSTGRES_INITDB_ARGS: -EUTF-8
    ports:
      - "5432:5432"
    networks:
      debug_def:
        ipv4_address: 172.16.1.4

networks:
  debug_def:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24

secrets:
  its_login:
    environment: ITS_LOGIN
  its_password:
    environment: ITS_PASSWORD
